name: Deploy GAS

on:
  push:
    branches: [main]
    paths:
      - 'apps-script/**'
      - '.clasp.json'
      - '.claspignore'
      - '.nvmrc'
      - '.github/workflows/deploy-gas.yml'

permissions:
  contents: read

# Mutual exclusion only: at most one deploy runs at a time (so two clasp pushes never race — including a
# manual re-run of the same commit), and the in-progress run always finishes (cancel-in-progress: false, no
# mid-push cancel). This does NOT order runs by commit — GitHub does not guarantee newest-last — so the
# newest-wins guarantee is enforced by the tip guard in the push step below, not here (PR #53 T1).
concurrency:
  group: deploy-gas-${{ github.ref }}
  cancel-in-progress: false

jobs:
  clasp-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Authenticate clasp
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: |
          if [ -z "$CLASPRC_JSON" ]; then
            echo "::error::Secret CLASPRC_JSON is not set (contents of ~/.clasprc.json after 'clasp login')"
            exit 1
          fi
          echo "$CLASPRC_JSON" > ~/.clasprc.json

      - name: Guard against placeholder scriptId
        run: |
          if grep -q REPLACE_WITH_SCRIPT_ID .clasp.json; then
            echo "::error::.clasp.json still contains the placeholder scriptId"
            exit 1
          fi

      - name: Push to Apps Script
        # Deploy only if this run's commit is still main's tip — re-checked before the retry (whose sleep is
        # the widest window for main to advance). GitHub does NOT order concurrency runs by commit, so an
        # older run can execute after a newer one; without this guard its retry could push a stale snapshot
        # over the newer deploy (PR #53 T1). A superseded run skips (exit 0 — a newer run deploys); a fetch
        # failure fails loud so a skip can't masquerade as a successful "nothing to deploy".
        run: |
          tip_check() {
            git fetch --quiet --depth=1 origin main \
              || { echo "::error::cannot fetch origin/main to verify the deploy tip"; exit 1; }
            [ "$(git rev-parse HEAD)" = "$(git rev-parse FETCH_HEAD)" ]
          }
          if ! tip_check; then
            echo "::notice::Skipping deploy — $(git rev-parse --short HEAD) is behind origin/main $(git rev-parse --short FETCH_HEAD); a newer run deploys it"
            exit 0
          fi
          if clasp push -f; then exit 0; fi
          echo "clasp push -f failed; retrying once after backoff if still the tip"
          sleep 10
          if ! tip_check; then
            echo "::notice::Superseded during backoff — a newer commit is now main's tip; not re-pushing the stale snapshot"
            exit 0
          fi
          clasp push -f
