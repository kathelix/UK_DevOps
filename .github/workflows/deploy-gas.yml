name: Deploy GAS

on:
  push:
    branches: [main]
    paths:
      - 'apps-script/**'
      - '.clasp.json'
      - '.claspignore'
      - '.nvmrc'
      - '.github/workflows/deploy-gas.yml'

permissions:
  contents: read

# Serialize deploys so a delayed older run's retry can't overwrite a newer commit's deploy (PR #53 F1):
# at most one deploy runs at a time, the in-progress run always finishes (cancel-in-progress: false — no
# mid-push cancel), and only the newest queued run follows it, so live Apps Script converges to the newest
# main commit. Without this, an older run that fails its first push and sleeps could wake after a newer run
# succeeded and re-push its stale snapshot.
concurrency:
  group: deploy-gas-${{ github.ref }}
  cancel-in-progress: false

jobs:
  clasp-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Authenticate clasp
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: |
          if [ -z "$CLASPRC_JSON" ]; then
            echo "::error::Secret CLASPRC_JSON is not set (contents of ~/.clasprc.json after 'clasp login')"
            exit 1
          fi
          echo "$CLASPRC_JSON" > ~/.clasprc.json

      - name: Guard against placeholder scriptId
        run: |
          if grep -q REPLACE_WITH_SCRIPT_ID .clasp.json; then
            echo "::error::.clasp.json still contains the placeholder scriptId"
            exit 1
          fi

      - name: Push to Apps Script
        # Retry once on a transient Apps Script API error (e.g. "Premature close"); see CLAUDE.md
        # "post-merge main CI" + PR #51/#53. A failure that survives the retry is more likely real.
        run: clasp push -f || (sleep 10; clasp push -f)
