name: Deploy GAS

on:
  push:
    branches: [main]
    paths:
      - 'apps-script/**'
      - '.clasp.json'
      - '.claspignore'
      - '.nvmrc'
      - '.github/workflows/deploy-gas.yml'

permissions:
  contents: read

jobs:
  clasp-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Authenticate clasp
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: |
          if [ -z "$CLASPRC_JSON" ]; then
            echo "::error::Secret CLASPRC_JSON is not set (contents of ~/.clasprc.json after 'clasp login')"
            exit 1
          fi
          echo "$CLASPRC_JSON" > ~/.clasprc.json

      - name: Guard against placeholder scriptId
        run: |
          if grep -q REPLACE_WITH_SCRIPT_ID .clasp.json; then
            echo "::error::.clasp.json still contains the placeholder scriptId"
            exit 1
          fi

      - name: Push to Apps Script
        # Retry once on a transient Apps Script API error (e.g. "Premature close"); see CLAUDE.md
        # "post-merge main CI". ACCEPTED RISK (PR #53, owner decision): the sleep is a small window in which
        # this older run's retry could overwrite a newer commit's deploy — accepted for a solo, low-volume
        # project (~10 PRs/day → ~0% overlap), caught by the post-merge main-CI check + the CI-failure email.
        # Revisit (add a stale-SHA tip guard) only if deploys become concurrent / high-volume.
        run: clasp push -f || (sleep 10; clasp push -f)
