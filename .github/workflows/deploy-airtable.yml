name: Deploy Airtable schema

on:
  push:
    branches: [main]
    paths:
      - 'airtable/**'
      - '.github/workflows/deploy-airtable.yml'

permissions:
  contents: read

jobs:
  apply-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Apply schema (additive-only)
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_SCHEMA_TOKEN }}
        run: node airtable/apply-schema.js airtable/schema.json
