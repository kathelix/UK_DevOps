name: Tests

on:
  pull_request:
    paths:
      - 'apps-script/**'
      - 'airtable/**'
      - 'instructions/**'
      - 'tests/**'
      - 'package.json'
      - '.nvmrc'
      - '.github/workflows/tests.yml'
  push:
    branches: [main]
    paths:
      - 'apps-script/**'
      - 'airtable/**'
      - 'instructions/**'
      - 'tests/**'
      - 'package.json'
      - '.nvmrc'
      - '.github/workflows/tests.yml'

permissions:
  contents: read

jobs:
  node-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Run unit tests
        run: node --test
